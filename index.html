<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Desktop Sticky Note</title>
  <style>
    :root {
      --sidebar-bg: #f2f2f2;
      --sidebar-width: 160px;
      --toolbar-height: 44px;
      --toolbar-bg: rgba(255, 255, 255, 0.86);
      --active-highlight: rgba(0, 0, 0, 0.08);
      --text-primary: #333;
      --text-muted: #888;
      --done-text: #a4a4a4;
      --border: #e0e0e0;
      --surface: #fffdf8;
      --shadow: rgba(48, 38, 24, 0.12);
      --calendar-dot: #2f855a;
      --mini-width: 220px;
      --mini-radius: 12px;
      --mini-bg: rgba(255, 255, 255, 0.92);
      --mini-shadow: 0 8px 32px rgba(0, 0, 0, 0.18);
      --font-ui: "Segoe UI", "Microsoft YaHei", "PingFang SC", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      font-family: var(--font-ui);
      color: var(--text-primary);
      background:
        radial-gradient(circle at top left, rgba(255, 211, 182, 0.55), transparent 30%),
        radial-gradient(circle at top right, rgba(255, 241, 179, 0.42), transparent 32%),
        linear-gradient(155deg, #f9f3e7 0%, #fffdf7 52%, #f3eadb 100%);
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      border: 0;
      background: none;
      color: inherit;
      cursor: pointer;
    }

    [hidden] {
      display: none !important;
    }

    .app {
      height: 100%;
      padding: 18px;
    }

    .app.mini {
      padding: 0;
      background: transparent;
    }

    .app.mini .frame {
      display: none;
    }

    .app:not(.mini) .mini-strip {
      display: none;
    }

    .frame {
      display: grid;
      grid-template-columns: var(--sidebar-width) minmax(0, 1fr);
      height: 100%;
      overflow: hidden;
      border-radius: 28px;
      background: rgba(255, 252, 246, 0.82);
      box-shadow: 0 22px 60px rgba(91, 68, 36, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.68);
      backdrop-filter: blur(16px);
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 12px 8px 10px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.74), rgba(242, 242, 242, 0.95));
      border-right: 1px solid var(--border);
    }

    .sidebar-title {
      padding: 4px 8px 0;
      font-size: 11px;
      line-height: 1;
      letter-spacing: 0.18em;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    .calendar-card {
      padding: 8px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.88);
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.04);
    }

    .calendar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .calendar-title {
      font-size: 12px;
      font-weight: 600;
    }

    .calendar-nav {
      display: flex;
      gap: 4px;
    }

    .calendar-nav button {
      width: 22px;
      height: 22px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.04);
    }

    .calendar-weekdays,
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
    }

    .calendar-weekday {
      font-size: 10px;
      text-align: center;
      color: var(--text-muted);
      padding: 2px 0;
    }

    .calendar-day {
      position: relative;
      min-height: 18px;
      padding: 3px 0;
      border-radius: 8px;
      font-size: 11px;
      text-align: center;
      transition: background 150ms ease, transform 150ms ease;
    }

    .calendar-day:hover:not(:disabled) {
      background: rgba(0, 0, 0, 0.05);
      transform: translateY(-1px);
    }

    .calendar-day.muted {
      color: #bcbcbc;
    }

    .calendar-day.today {
      background: #222;
      color: #fff;
    }

    .calendar-day.selected {
      outline: 2px solid rgba(66, 153, 225, 0.55);
      outline-offset: -2px;
    }

    .calendar-day.has-data::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 1px;
      width: 4px;
      height: 4px;
      border-radius: 999px;
      background: var(--calendar-dot);
      transform: translateX(-50%);
    }

    .calendar-filter-note {
      margin-top: 6px;
      font-size: 10px;
      color: var(--text-muted);
      line-height: 1.4;
    }

    .sidebar-scroll {
      flex: 1;
      overflow: auto;
      padding-right: 2px;
    }

    .group {
      margin-top: 8px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.56);
      overflow: hidden;
    }

    .group-header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 22px;
      align-items: center;
      gap: 6px;
      padding: 8px 8px 7px;
    }

    .group-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
      text-align: left;
      font-size: 12px;
      font-weight: 600;
    }

    .group-toggle .label {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .group-action {
      width: 22px;
      height: 22px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.05);
    }

    .group-body {
      padding: 0 6px 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-height: 320px;
      overflow: auto;
      transition: max-height 300ms ease, opacity 200ms ease;
    }

    .group.collapsed .group-body {
      max-height: 0;
      opacity: 0;
      padding-top: 0;
      padding-bottom: 0;
      overflow: hidden;
    }

    .item-row {
      display: grid;
      grid-template-columns: 12px minmax(0, 1fr) 20px;
      align-items: center;
      gap: 6px;
      padding: 7px 6px;
      border-radius: 12px;
      transition: background 150ms ease, transform 150ms ease;
    }

    .item-row:hover {
      background: rgba(255, 255, 255, 0.74);
      transform: translateY(-1px);
    }

    .item-row.active {
      background: var(--active-highlight);
    }

    .item-color {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.08);
    }

    .item-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-align: left;
      font-size: 12px;
    }

    .item-delete {
      width: 20px;
      height: 20px;
      border-radius: 8px;
      color: var(--text-muted);
    }

    .workspace {
      display: grid;
      grid-template-rows: var(--toolbar-height) minmax(0, 1fr);
      min-width: 0;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      padding: 0 14px;
      background: var(--toolbar-bg);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(14px);
      -webkit-app-region: drag;
    }

    .toolbar-title {
      min-width: 0;
      flex: 1;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      font-weight: 600;
    }

    .toolbar-path {
      color: #555;
      white-space: nowrap;
    }

    .toolbar-title button,
    .toolbar-title input {
      min-width: 0;
      max-width: 420px;
      padding: 3px 8px;
      border-radius: 10px;
      border: 1px solid transparent;
      background: transparent;
      text-align: left;
      color: inherit;
    }

    .toolbar-title button:hover {
      background: rgba(0, 0, 0, 0.04);
    }

    .toolbar-title input {
      border-color: rgba(0, 0, 0, 0.12);
      background: rgba(255, 255, 255, 0.76);
      outline: none;
    }

    .toolbar-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }

    .toolbar-button {
      min-width: 34px;
      padding: 0 12px;
      height: 34px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.72);
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.05);
      transition: transform 150ms ease, background 150ms ease;
      white-space: nowrap;
      -webkit-app-region: no-drag;
    }

    .toolbar-title button,
    .toolbar-title input {
      -webkit-app-region: no-drag;
    }

    .toolbar-button:hover:not(:disabled) {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.98);
    }

    .toolbar-button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .surface {
      position: relative;
      overflow: hidden;
      padding: 16px;
    }

    .content-panel {
      position: relative;
      height: 100%;
      display: flex;
      flex-direction: column;
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.24), rgba(255, 255, 255, 0.08)), var(--panel-color, #ffefc9);
      box-shadow: 0 18px 38px var(--shadow);
      overflow: hidden;
      animation: panelIn 150ms ease;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 18px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.38);
      background: rgba(255, 255, 255, 0.18);
    }

    .panel-badges {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      font-size: 12px;
    }

    .badge {
      padding: 5px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.56);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.34);
    }

    .note-body {
      display: flex;
      flex-direction: column;
      min-height: 0;
      flex: 1;
    }

    .note-editor {
      flex: 1;
      min-height: 0;
      padding: 18px 20px 10px;
      outline: none;
      overflow: auto;
      font-size: 15px;
      line-height: 1.8;
      color: #43342d;
    }

    .note-editor.is-empty::before {
      content: attr(data-placeholder);
      color: rgba(67, 52, 45, 0.48);
    }

    .note-editor p:first-child {
      margin-top: 0;
    }

    .note-editor img {
      max-width: 100%;
      border-radius: 14px;
      box-shadow: 0 10px 26px rgba(54, 43, 29, 0.16);
      margin: 8px 0;
    }

    .note-footer {
      padding: 8px 20px 16px;
      text-align: right;
      font-size: 12px;
      color: rgba(67, 52, 45, 0.7);
    }

    .todo-body {
      display: flex;
      flex-direction: column;
      min-height: 0;
      flex: 1;
      padding: 14px 18px 18px;
      gap: 14px;
    }

    .todo-list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 0;
    }

    .todo-scroller {
      min-height: 0;
      overflow: auto;
    }

    .todo-item {
      display: grid;
      grid-template-columns: 22px minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.5);
      transition: transform 150ms ease, background 150ms ease;
    }

    .todo-item:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.72);
    }

    .todo-item.dragging {
      opacity: 0.55;
    }

    .todo-checkbox {
      width: 18px;
      height: 18px;
      accent-color: #3d9970;
    }

    .todo-text {
      min-width: 0;
      word-break: break-word;
      font-size: 14px;
    }

    .todo-item.done .todo-text,
    .todo-item.abandoned .todo-text {
      color: var(--done-text);
      text-decoration: line-through;
    }

    .todo-tag {
      padding: 3px 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.56);
      font-size: 11px;
      color: #4f4f4f;
    }

    .todo-add {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 42px;
      gap: 8px;
    }

    .todo-add input {
      height: 40px;
      border: 1px solid rgba(0, 0, 0, 0.08);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.8);
      padding: 0 14px;
      outline: none;
    }

    .todo-add button {
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.8);
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.06);
      font-size: 18px;
    }

    .archive {
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.3);
      overflow: hidden;
    }

    .archive-toggle {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      font-size: 13px;
      font-weight: 600;
      text-align: left;
    }

    .archive-content {
      padding: 0 12px 12px;
      max-height: 0;
      overflow: hidden;
      transition: max-height 300ms ease;
    }

    .archive.expanded .archive-content {
      max-height: 400px;
    }

    .archive-list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .empty-state {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: 24px;
      text-align: center;
      color: var(--text-muted);
      line-height: 1.7;
    }

    .popover,
    .menu {
      position: fixed;
      z-index: 40;
      min-width: 200px;
      padding: 10px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid rgba(0, 0, 0, 0.06);
      box-shadow: 0 20px 42px rgba(39, 32, 20, 0.18);
      animation: popIn 120ms ease;
    }

    .swatches {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 10px;
    }

    .swatch {
      width: 34px;
      height: 34px;
      border-radius: 12px;
      border: 2px solid rgba(255, 255, 255, 0.9);
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.08);
    }

    .color-picker-input {
      width: 100%;
      height: 40px;
      border: 0;
      background: transparent;
      padding: 0;
    }

    .menu button {
      width: 100%;
      padding: 10px 12px;
      border-radius: 12px;
      text-align: left;
    }

    .menu button:hover {
      background: rgba(0, 0, 0, 0.05);
    }

    .menu-divider {
      height: 1px;
      margin: 8px 0;
      background: var(--border);
    }

    dialog {
      border: 0;
      padding: 0;
      border-radius: 24px;
      width: min(360px, calc(100vw - 32px));
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.22);
    }

    dialog::backdrop {
      background: rgba(20, 18, 12, 0.26);
      backdrop-filter: blur(4px);
    }

    .dialog-card {
      padding: 18px;
      background: #fffefb;
    }

    .dialog-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .dialog-copy {
      margin-bottom: 16px;
      color: #666;
      line-height: 1.6;
      font-size: 13px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 14px;
    }

    .field label {
      font-size: 12px;
      color: #666;
    }

    .field input {
      height: 40px;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 0 12px;
      outline: none;
    }

    .quick-colors {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .quick-color {
      width: 28px;
      height: 28px;
      border-radius: 999px;
      border: 2px solid #fff;
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.1);
    }

    .mini-strip {
      width: var(--mini-width);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-radius: var(--mini-radius);
      background: var(--mini-bg);
      box-shadow: var(--mini-shadow);
      border: 1px solid rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);
      color: var(--text-primary);
    }

    .mini-header {
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 0 8px 0 10px;
      border-bottom: 1px solid var(--border);
      font-weight: 700;
      font-size: 13px;
      -webkit-app-region: drag;
    }

    .mini-header button,
    .mini-actions button,
    .mini-row button,
    .mini-task input {
      -webkit-app-region: no-drag;
    }

    .mini-header button {
      height: 26px;
      padding: 0 8px;
      border-radius: 9px;
      background: rgba(0, 0, 0, 0.06);
      font-size: 12px;
    }

    .mini-body {
      flex: 1;
      min-height: 0;
      padding: 8px;
      overflow: auto;
    }

    .mini-section {
      margin-bottom: 10px;
    }

    .mini-section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 6px 2px;
      color: #666;
      font-size: 12px;
      font-weight: 700;
    }

    .mini-row {
      display: grid;
      grid-template-columns: 10px minmax(0, 1fr) 24px;
      align-items: center;
      gap: 7px;
      min-height: 30px;
      padding: 6px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.58);
      margin-bottom: 5px;
    }

    .mini-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.08);
    }

    .mini-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-align: left;
      font-size: 12px;
    }

    .mini-open {
      width: 24px;
      height: 24px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.05);
    }

    .mini-preview {
      max-height: 180px;
      overflow: auto;
      margin: -2px 0 6px 17px;
      padding: 8px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.76);
      color: #555;
      font-size: 12px;
      line-height: 1.6;
      animation: panelIn 150ms ease;
    }

    .mini-todo {
      padding: 7px;
      border-radius: 11px;
      background: rgba(255, 255, 255, 0.48);
      margin-bottom: 6px;
    }

    .mini-todo-head {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
      font-size: 12px;
      font-weight: 700;
    }

    .mini-task {
      display: grid;
      grid-template-columns: 18px minmax(0, 1fr);
      align-items: start;
      gap: 5px;
      padding: 3px 0;
      font-size: 12px;
      line-height: 1.4;
    }

    .mini-task span {
      min-width: 0;
      word-break: break-word;
    }

    .mini-more {
      display: block;
      margin-top: 4px;
      width: 100%;
      padding: 5px;
      border-radius: 8px;
      color: #666;
      background: rgba(0, 0, 0, 0.04);
      font-size: 12px;
    }

    .mini-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      padding: 8px;
      border-top: 1px solid var(--border);
    }

    .mini-actions button {
      height: 30px;
      border-radius: 10px;
      background: rgba(0, 0, 0, 0.06);
      font-size: 12px;
      font-weight: 700;
    }

    .mini-empty {
      padding: 10px 6px;
      color: #888;
      font-size: 12px;
    }

    .dialog-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 18px;
    }

    .dialog-actions button {
      min-width: 86px;
      height: 38px;
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.06);
    }

    .dialog-actions .primary {
      background: #222;
      color: #fff;
    }

    @keyframes panelIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: scale(0.95);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @media (max-width: 860px) {
      .app {
        padding: 10px;
      }

      .frame {
        grid-template-columns: 160px minmax(0, 1fr);
        border-radius: 20px;
      }

      .toolbar-title button,
      .toolbar-title input {
        max-width: 180px;
      }

      .toolbar-actions {
        gap: 4px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="frame">
      <aside class="sidebar">
        <div class="sidebar-title">&#20415;&#31614;&#24212;&#29992;</div>
        <section class="calendar-card" id="calendarCard"></section>
        <div class="sidebar-scroll">
          <section class="group" data-group="notes">
            <div class="group-header">
              <button class="group-toggle" type="button" data-toggle-group="notes">
                <span>&#128221;</span>
                <span class="label">&#20415;&#31614;</span>
              </button>
              <button class="group-action" type="button" data-create-type="note" title="&#26032;&#24314;&#20415;&#31614;">+</button>
            </div>
            <div class="group-body" id="noteGroupBody"></div>
          </section>

          <section class="group" data-group="todoLists">
            <div class="group-header">
